<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxora - Montre Connectée de Luxe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #f5f5f7;
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        /* Header */
        header {
            padding: 1.5rem 0;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 100;
            background: rgba(10, 10, 15, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #d4af37, #f5e7a3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        nav a {
            color: #f5f5f7;
            text-decoration: none;
            margin-left: 2.5rem;
            font-weight: 300;
            font-size: 0.95rem;
            letter-spacing: 1px;
            transition: color 0.3s;
        }

        nav a:hover {
            color: #d4af37;
        }

        .btn-cta-nav {
            background: #d4af37;
            color: #0a0a0f !important;
            padding: 0.6rem 1.8rem;
            border-radius: 50px;
            font-weight: 600;
            margin-left: 2.5rem;
            transition: all 0.3s;
        }

        .btn-cta-nav:hover {
            background: #f5e7a3;
            transform: scale(1.02);
        }

        /* Hero */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding-top: 6rem;
            position: relative;
            background: radial-gradient(ellipse at 20% 50%, #1a1a2e 0%, #0a0a0f 70%);
        }

        .hero .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: center;
        }

        .hero-content h1 {
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 1.5rem;
        }

        .hero-content h1 span {
            background: linear-gradient(135deg, #d4af37, #f5e7a3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-content p {
            font-size: 1.2rem;
            color: #a0a0b0;
            margin-bottom: 2.5rem;
            max-width: 500px;
        }

        .hero-badge {
            display: inline-block;
            background: rgba(212, 175, 55, 0.15);
            border: 1px solid rgba(212, 175, 55, 0.3);
            padding: 0.4rem 1.2rem;
            border-radius: 50px;
            font-size: 0.85rem;
            color: #d4af37;
            margin-bottom: 1.5rem;
            letter-spacing: 1px;
        }

        .btn-primary {
            display: inline-block;
            background: #d4af37;
            color: #0a0a0f;
            padding: 1rem 3rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.1rem;
            text-decoration: none;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
        }

        .btn-primary:hover {
            background: #f5e7a3;
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(212, 175, 55, 0.2);
        }

        .hero-image {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .hero-image img {
            width: 100%;
            max-width: 500px;
            filter: drop-shadow(0 30px 60px rgba(212, 175, 55, 0.15));
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        .hero-glow {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.08), transparent 70%);
            border-radius: 50%;
            z-index: -1;
        }

        /* Features */
        .features {
            padding: 6rem 0;
            background: #0e0e16;
        }

        .features h2 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            text-align: center;
            margin-bottom: 1rem;
        }

        .features .subtitle {
            text-align: center;
            color: #a0a0b0;
            margin-bottom: 4rem;
            font-size: 1.1rem;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2.5rem;
        }

        .feature-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 2.5rem 2rem;
            border-radius: 20px;
            transition: all 0.4s;
            text-align: center;
        }

        .feature-card:hover {
            background: rgba(212, 175, 55, 0.05);
            border-color: rgba(212, 175, 55, 0.2);
            transform: translateY(-8px);
        }

        .feature-icon {
            font-size: 2.5rem;
            margin-bottom: 1.5rem;
            display: block;
        }

        .feature-card h3 {
            font-size: 1.4rem;
            margin-bottom: 0.8rem;
            font-weight: 600;
        }

        .feature-card p {
            color: #a0a0b0;
            font-size: 0.95rem;
        }

        /* Specs */
        .specs {
            padding: 6rem 0;
        }

        .specs .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: center;
        }

        .specs-image img {
            width: 100%;
            max-width: 450px;
            border-radius: 20px;
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.5));
        }

        .specs-content h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            margin-bottom: 2rem;
        }

        .specs-list {
            list-style: none;
        }

        .specs-list li {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.8rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 1.05rem;
        }

        .specs-list li:last-child {
            border-bottom: none;
        }

        .specs-list .check {
            color: #d4af37;
            font-weight: 700;
            font-size: 1.3rem;
        }

        /* Testimonial */
        .testimonial {
            padding: 5rem 0;
            background: #0e0e16;
            text-align: center;
        }

        .testimonial blockquote {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            max-width: 800px;
            margin: 0 auto 2rem;
            line-height: 1.4;
            color: #e0e0e0;
        }

        .testimonial cite {
            font-style: normal;
            color: #d4af37;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .testimonial .role {
            color: #a0a0b0;
            font-size: 0.9rem;
        }

        /* CTA */
        .cta {
            padding: 6rem 0;
            text-align: center;
            background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a0f 70%);
        }

        .cta h2 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            margin-bottom: 1rem;
        }

        .cta p {
            color: #a0a0b0;
            font-size: 1.2rem;
            margin-bottom: 2.5rem;
        }

        .cta .price {
            font-size: 2.5rem;
            font-weight: 700;
            color: #d4af37;
            margin-bottom: 2rem;
        }

        .cta .price small {
            font-size: 1rem;
            color: #a0a0b0;
            font-weight: 300;
        }

        .btn-secondary {
            display: inline-block;
            background: transparent;
            color: #d4af37;
            border: 2px solid #d4af37;
            padding: 0.9rem 2.5rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            text-decoration: none;
            margin-left: 1rem;
            transition: all 0.3s;
        }

        .btn-secondary:hover {
            background: #d4af37;
            color: #0a0a0f;
        }

        /* Footer */
        footer {
            padding: 2rem 0;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
            color: #606070;
            font-size: 0.9rem;
        }

        footer a {
            color: #d4af37;
            text-decoration: none;
        }

        /* Responsive */
        @media (max-width: 968px) {
            .hero .container {
                grid-template-columns: 1fr;
                text-align: center;
            }

            .hero-content p {
                margin: 0 auto 2.5rem;
            }

            .hero-image {
                order: -1;
            }

            .hero-image img {
                max-width: 300px;
            }

            .features-grid {
                grid-template-columns: 1fr 1fr;
            }

            .specs .container {
                grid-template-columns: 1fr;
                text-align: center;
            }

            .specs-image {
                order: -1;
            }

            .specs-list li {
                justify-content: center;
            }

            .cta h2 {
                font-size: 2.5rem;
            }
        }

        @media (max-width: 600px) {
            header .container {
                flex-direction: column;
                gap: 1rem;
            }

            nav a {
                margin-left: 1rem;
                font-size: 0.8rem;
            }

            .btn-cta-nav {
                margin-left: 1rem;
                padding: 0.4rem 1.2rem;
            }

            .hero-content h1 {
                font-size: 2.8rem;
            }

            .features-grid {
                grid-template-columns: 1fr;
            }
